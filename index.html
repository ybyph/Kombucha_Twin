<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kombucha Twin Pro v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; color: #e5e5e5; font-family: -apple-system, sans-serif; }
        .glass-card { background: rgba(26, 26, 26, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 16px; }
        input, select { background-color: #000 !important; border: 1px solid #333 !important; color: #fff !important; border-radius: 8px; padding: 10px; width: 100%; outline: none; }
        input:focus { border-color: #fbbf24 !important; }
        .stat-label { font-size: 10px; color: #6b7280; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto pb-24">

    <header class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter text-white">KOMBUCHA <span class="text-amber-500">TWIN</span></h1>
            <p class="text-[10px] text-gray-500 font-bold">V4.0 - PHYSICAL ENGINE ACTIVE</p>
        </div>
        <button onclick="resetBatch()" class="text-[10px] bg-red-900/20 text-red-500 border border-red-900/50 px-3 py-1 rounded-full uppercase font-black">重置批次</button>
    </header>

    <section class="glass-card p-5 mb-4 border-l-4 border-blue-500">
        <h3 class="stat-label text-blue-400">容器物理约束</h3>
        <div class="grid grid-cols-2 gap-6 mt-2">
            <div>
                <label class="stat-label">液位高度 (cm)</label>
                <input type="number" id="m-height" value="18.5" step="0.1" oninput="runGlobalLogic()">
            </div>
            <div>
                <label class="stat-label">A/V 传质比</label>
                <div id="av-display" class="stat-value text-2xl text-green-400">0.054</div>
            </div>
        </div>
    </section>

    <section class="glass-card p-5 mb-4">
        <h3 class="stat-label text-amber-500">新手配方推算 (1:7)</h3>
        <div class="flex gap-3 mt-2">
            <div class="flex-1">
                <label class="stat-label text-[8px]">以启动液为基准 (g)</label>
                <input type="number" id="starter-base" value="300" oninput="calculateRecipe()">
            </div>
            <div class="flex-none pt-4">
                <button onclick="applyRecipe()" class="bg-amber-500 text-black px-6 py-2 rounded-xl font-black text-sm active:scale-95 transition-transform">应用</button>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-2 mt-4 text-[11px] font-mono text-gray-400 border-t border-white/5 pt-4">
            <div>纯水: <span id="r-water" class="text-white">--</span>g</div>
            <div>启动液: <span id="r-starter" class="text-white">--</span>g</div>
            <div>白糖: <span id="r-sugar" class="text-white">--</span>g</div>
            <div>干茶: <span id="r-tea" class="text-white">--</span>g</div>
        </div>
    </section>

    <section class="grid grid-cols-2 gap-4 mb-4 text-center">
        <div class="glass-card p-4 border-b-4 border-amber-600">
            <p class="stat-label">估计 ABV</p>
            <p id="abv-display" class="stat-value text-3xl text-amber-500">0.00%</p>
        </div>
        <div class="glass-card p-4 border-b-4 border-gray-600">
            <p class="stat-label">预计剩余</p>
            <p id="time-display" class="stat-value text-3xl text-white">--</p>
        </div>
    </section>

    <section class="glass-card p-5 mb-8">
        <h3 class="stat-label">采样日志矩阵</h3>
        <div class="grid grid-cols-2 gap-3 mt-2">
            <div>
                <label class="stat-label">BRIX %</label>
                <input type="number" id="in-brix" placeholder="10.0" step="0.1">
            </div>
            <div>
                <label class="stat-label">温度 °C</label>
                <input type="number" id="in-temp" value="25">
            </div>
        </div>
        <button onclick="addLog()" class="w-full bg-white text-black font-black py-3 rounded-xl mt-4 hover:bg-gray-200 uppercase tracking-widest">Append Log</button>
    </section>

    <div id="log-container" class="space-y-3"></div>

    <script>
        let state = JSON.parse(localStorage.getItem('kombucha_pro_logs')) || [];

        function runGlobalLogic() {
            // 1. A/V 物理计算
            const h = parseFloat(document.getElementById('m-height').value) || 0;
            const av = h > 0 ? (1/h).toFixed(3) : "0.000";
            document.getElementById('av-display').innerText = av;

            // 2. 看板计算
            if (state.length > 0) {
                const first = state[0];
                const last = state[state.length - 1];
                
                // ABV 逻辑 (Brix差 * 0.5)
                const abv = Math.max(0, (first.brix - last.brix) * 0.5);
                document.getElementById('abv-display').innerText = abv.toFixed(2) + "%";

                // 积温逻辑 (2100度小时)
                const avgTemp = state.reduce((s, l) => s + l.temp, 0) / state.length;
                const hoursNeeded = 2100 / (avgTemp || 25);
                const elapsed = (Date.now() - first.time) / 3600000;
                const remain = Math.max(0, hoursNeeded - elapsed);
                document.getElementById('time-display').innerText = Math.round(remain) + "h";
            }
            calculateRecipe();
            renderLogs();
        }

        function calculateRecipe() {
            const base = parseFloat(document.getElementById('starter-base').value) || 0;
            const water = base * 7;
            document.getElementById('r-water').innerText = Math.round(water);
            document.getElementById('r-starter').innerText = Math.round(base);
            document.getElementById('r-sugar').innerText = Math.round(water * 0.1);
            document.getElementById('r-tea').innerText = Math.round(water * 0.01);
        }

        function applyRecipe() {
            alert("配方参数已计算，请按此比例投料");
        }

        function addLog() {
            const b = parseFloat(document.getElementById('in-brix').value);
            const t = parseFloat(document.getElementById('in-temp').value) || 25;
            if (isNaN(b)) return alert("请输入 Brix 数据");

            state.push({ brix: b, temp: t, time: Date.now() });
            localStorage.setItem('kombucha_pro_logs', JSON.stringify(state));
            document.getElementById('in-brix').value = "";
            runGlobalLogic();
        }

        function renderLogs() {
            const container = document.getElementById('log-container');
            container.innerHTML = state.map((log, i) => `
                <div class="glass-card p-4 flex justify-between items-center animate-in fade-in slide-in-from-bottom-2 duration-300">
                    <div>
                        <p class="text-[10px] text-gray-500 font-bold uppercase">${new Date(log.time).toLocaleTimeString()}</p>
                        <p class="text-sm font-mono"><span class="text-amber-500">BRIX:</span> ${log.brix}% | <span class="text-blue-400">TEMP:</span> ${log.temp}°C</p>
                    </div>
                    <button onclick="deleteLog(${i})" class="text-red-900 hover:text-red-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                </div>
            `).reverse().join('');
        }

        function deleteLog(i) {
            state.splice(i, 1);
            localStorage.setItem('kombucha_pro_logs', JSON.stringify(state));
            runGlobalLogic();
        }

        function resetBatch() {
            if (confirm("确定要删除所有历史记录，开始新的酿造批次吗？")) {
                localStorage.clear();
                state = [];
                location.reload();
            }
        }

        window.onload = runGlobalLogic;
    </script>
</body>
</html>
