<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAB TWIN v9.0 - Golden Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap');
        body { background-color: #050505; color: #e5e5e5; font-family: -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
        .glass-card { background: rgba(18, 18, 18, 0.9); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; margin-bottom: 16px; }
        input, select { background-color: #000 !important; border: 1px solid #333 !important; color: #fff !important; border-radius: 8px; padding: 10px; font-family: 'JetBrains Mono'; font-size: 14px; outline: none; width: 100%; transition: all 0.2s; }
        input:focus, select:focus { border-color: #fbbf24 !important; }
        input:read-only { opacity: 0.5; background-color: #111 !important; }
        .stat-label { font-size: 10px; color: #6b7280; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block; }
        .stat-value { font-family: 'JetBrains Mono'; font-weight: 800; }
        .warn-text { color: #ef4444; font-size: 10px; font-weight: bold; margin-top: 4px; }
        
        #toast { visibility: hidden; background-color: #fbbf24; color: #000; text-align: center; border-radius: 8px; padding: 10px; position: fixed; z-index: 50; left: 50%; top: 20px; transform: translateX(-50%); font-size: 12px; font-weight: bold; opacity: 0; transition: opacity 0.3s; }
        #toast.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto pb-32">

    <div id="toast">操作已保存</div>

    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter">LAB <span class="text-amber-500">TWIN</span> <span class="text-xs text-gray-500">v9.0</span></h1>
            <p class="text-[9px] text-gray-600 font-bold uppercase tracking-widest">Noma Protocol Agent</p>
        </div>
        <button onclick="resetBatch()" class="text-[9px] bg-red-950/30 text-red-500 border border-red-900/40 px-3 py-1.5 rounded-full font-black">RESET(清空)</button>
    </header>

    <div class="glass-card p-4">
        <h3 class="stat-label text-blue-400">容器物理与 A/V 比监控</h3>
        <div class="grid grid-cols-2 gap-4 mb-3">
            <div><label class="stat-label">液面直径 (cm)</label><input type="number" id="m-diameter" placeholder="cm" class="sys-input"></div>
            <div><label class="stat-label">实际液位 (cm)</label><input type="number" id="m-height" placeholder="cm" class="sys-input"></div>
        </div>
        <div class="bg-black p-3 rounded-lg border border-white/5 flex justify-between items-center">
            <div>
                <span class="stat-label !mb-0 text-gray-500">当前 A/V 比</span>
                <span id="av-display" class="stat-value text-lg text-white">--</span>
            </div>
            <div id="av-warn" class="text-right max-w-[60%]"></div>
        </div>
    </div>

    <div class="glass-card p-4">
        <h3 class="stat-label text-amber-500">启动原液录入 (Noma 1:7 法则)</h3>
        <div class="grid grid-cols-2 gap-3 mb-3">
            <div class="col-span-2">
                <label class="stat-label">启动原液 (g) <span class="text-[9px] text-gray-500 normal-case ml-2">需占总体积 10-20%</span></label>
                <input type="number" id="r-starter" placeholder="输入原液克数" class="sys-input !border-amber-500/50 !text-amber-500">
            </div>
            <div><label class="stat-label">水 (g)</label><input type="number" id="r-water" readonly class="sys-input bg-gray-900"></div>
            <div><label class="stat-label">糖 (g) [10%]</label><input type="number" id="r-sugar" readonly class="sys-input bg-gray-900"></div>
        </div>
        <div id="ph-danger" class="hidden bg-red-950/40 border border-red-800 p-2 rounded text-[10px] text-red-400 mb-2">
            ⚠️ 初始 pH 极高风险：需立即确保混合液 pH < 4.5，否则有肉毒杆菌及霉菌风险。
        </div>
    </div>

    <div id="f1-module">
        <div class="flex items-center justify-between ml-2 mb-2">
            <h2 class="stat-label text-white !mb-0">F1 核心指标追踪 (pH 优先)</h2>
            <span class="text-[10px] text-gray-500">目标 pH: 3.0 - 3.2</span>
        </div>
        
        <section class="glass-card p-4 mb-4">
            <div class="flex justify-between mb-2">
                <div>
                    <p class="stat-label">发酵预计剩余时间</p>
                    <p id="f1-countdown" class="stat-value text-xl text-blue-400 mt-1">等待采样</p>
                </div>
            </div>
            <div class="h-40 w-full relative">
                <canvas id="roadmap-chart"></canvas>
            </div>
        </section>

        <section class="glass-card p-4">
            <h3 class="stat-label">F1 日志采集</h3>
            <div class="grid grid-cols-3 gap-3 mb-3">
                <div><label class="stat-label">BRIX</label><input type="number" id="in-brix" step="0.1" class="sys-input"></div>
                <div><label class="stat-label text-blue-400">pH (关键)</label><input type="number" id="in-ph" step="0.1" class="sys-input"></div>
                <div><label class="stat-label">TEMP(°C)</label><input type="number" id="in-temp" class="sys-input"></div>
            </div>
            <div class="mb-4"><label class="stat-label">采样时间</label><input type="datetime-local" id="in-time" class="sys-input text-xs"></div>
            
            <button onclick="addLog()" class="w-full bg-amber-500 text-black font-black py-3 rounded-lg text-sm">记录数据</button>
            
            <div class="mt-4 pt-4 border-t border-white/10">
                <button onclick="startF2()" class="w-full bg-purple-600/20 text-purple-400 border border-purple-600/50 font-black py-3 rounded-lg text-xs">pH 达标，进入 F2 碳酸化</button>
            </div>
        </section>
    </div>

    <div id="f2-module" class="hidden">
        <h2 class="stat-label text-purple-500 ml-2 mb-2">F2 Carbonation (二发动态控制)</h2>
        
        <section class="glass-card p-4">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="col-span-2">
                    <label class="stat-label text-purple-400">选择添加物类型</label>
                    <select id="f2-fruit-type" class="sys-input" onchange="runLogic()">
                        <option value="0">无额外添加 (仅原味残糖)</option>
                        <option value="0.05">低糖水果 (莓果类/西瓜 ≈5%)</option>
                        <option value="0.10">中糖水果 (苹果/橙子 ≈10%)</option>
                        <option value="0.16">高糖水果 (葡萄/芒果 ≈16%)</option>
                        <option value="1.0">纯糖/糖浆 (100%)</option>
                    </select>
                </div>
                <div><label class="stat-label">添加量 (g)</label><input type="number" id="f2-fruit-weight" placeholder="克重" class="sys-input" oninput="runLogic()"></div>
                <div><label class="stat-label">F2 环境室温 (°C)</label><input type="number" id="f2-temp" value="25" class="sys-input" oninput="runLogic()"></div>
            </div>

            <div class="bg-black p-3 rounded-lg border border-white/5 mb-4">
                <p class="stat-label">动态气压预估 (CO2 Vol)</p>
                <div class="flex items-end gap-2">
                    <p id="f2-co2" class="stat-value text-2xl text-purple-400">--</p>
                    <p id="f2-warn" class="text-[10px] mb-1"></p>
                </div>
            </div>

            <button onclick="cancelF2()" class="w-full bg-gray-800 text-gray-400 py-2 rounded-lg text-xs">撤回至 F1</button>
        </section>
    </div>

    <div id="log-container" class="space-y-2 mt-4"></div>

    <script>
        let state = JSON.parse(localStorage.getItem('kb_lab_v9')) || {
            f1: { logs: [] },
            f2: { active: false, type: 0, weight: 0, temp: 25, startTime: null }
        };
        let chart = null;

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = 'show';
            setTimeout(() => t.className = '', 2000);
        }

        document.querySelectorAll('.sys-input').forEach(input => {
            input.addEventListener('change', runLogic);
        });

        function runLogic() {
            // A/V Ratio Eval
            const h = parseFloat(document.getElementById('m-height').value);
            const avEl = document.getElementById('av-display');
            const avWarn = document.getElementById('av-warn');
            
            if (h > 0) {
                const av = 1 / h;
                avEl.innerText = av.toFixed(3);
                if (av > 0.25) {
                    avWarn.innerHTML = `<span class="text-[10px] text-red-500">⚠️ 高好氧：酸化极快，可能缺乏层次</span>`;
                } else if (av < 0.08) {
                    avWarn.innerHTML = `<span class="text-[10px] text-amber-500">⚠️ 低氧：酵母主导，酒精度和异味风险增高</span>`;
                } else {
                    avWarn.innerHTML = `<span class="text-[10px] text-green-500">✓ 理想范围 (0.1 - 0.2)</span>`;
                }
            } else {
                avEl.innerText = "--";
                avWarn.innerHTML = "";
            }

            // Auto Recipe Math
            const starter = parseFloat(document.getElementById('r-starter').value) || 0;
            if (starter > 0) {
                document.getElementById('r-water').value = Math.round(starter * 7);
                document.getElementById('r-sugar').value = Math.round(starter * 7 * 0.1);
            }

            // pH Init Warning
            const phWarn = document.getElementById('ph-danger');
            if (state.f1.logs.length === 0 && starter > 0) {
                phWarn.classList.remove('hidden');
            } else {
                phWarn.classList.add('hidden');
            }

            document.getElementById('f1-module').style.display = state.f2.active ? 'none' : 'block';
            document.getElementById('f2-module').style.display = state.f2.active ? 'block' : 'none';

            // F1 Prediction (Q10 Biology Model)
            if (state.f1.logs.length > 0 && !state.f2.active) {
                const logs = state.f1.logs;
                const current = logs[logs.length - 1];
                const avgT = logs.reduce((s, l) => s + l.temp, 0) / logs.length;
                
                // Base: 7 days (168h) at 26C to drop pH from 4.5 to 3.0
                // Q10 = 2.0 (Rate doubles every 10 degrees)
                const q10 = 2.0;
                const rateMultiplier = Math.pow(q10, (avgT - 26) / 10);
                const totalHoursNeeded = 168 / (rateMultiplier || 1);
                
                // Estimate progress based on pH drop (Assumes starting pH 4.5 -> Target 3.0)
                const phProgress = Math.max(0, Math.min(1, (4.5 - current.ph) / 1.5)); 
                const hoursLeft = totalHoursNeeded * (1 - phProgress);

                if (current.ph <= 3.2) {
                    document.getElementById('f1-countdown').innerText = "✅ pH 达标 (≤3.2)";
                    document.getElementById('f1-countdown').className = "stat-value text-xl text-green-400 mt-1";
                } else if (hoursLeft > 0) {
                    document.getElementById('f1-countdown').innerText = `约 ${Math.round(hoursLeft)} 小时`;
                    document.getElementById('f1-countdown').className = "stat-value text-xl text-blue-400 mt-1";
                }
            }

            // F2 Logic
            if (state.f2.active) {
                const fruitRatio = parseFloat(document.getElementById('f2-fruit-type').value);
                const fruitWeight = parseFloat(document.getElementById('f2-fruit-weight').value) || 0;
                const totalWater = parseFloat(document.getElementById('r-water').value) || 3000;
                
                // Residual F1 sugar + F2 new sugar
                const addedSugarGrams = fruitRatio * fruitWeight;
                const liters = (totalWater + starter) / 1000 || 3;
                
                // Rough estimate: 4g sugar/L generates ~1 Vol CO2 in closed system
                // Residual CO2 from F1 is roughly 0.5 Vol
                const co2Vol = 0.5 + (addedSugarGrams / liters / 4);
                
                document.getElementById('f2-co2').innerText = `${co2Vol.toFixed(2)} Vol`;
                
                const warnEl = document.getElementById('f2-warn');
                if (co2Vol > 3.0) {
                    warnEl.innerText = "💣 极高爆瓶风险";
                    warnEl.className = "text-[11px] text-red-500 font-bold ml-2";
                } else if (co2Vol > 2.0) {
                    warnEl.innerText = "充足气泡";
                    warnEl.className = "text-[11px] text-green-400 font-bold ml-2";
                } else {
                    warnEl.innerText = "微量气泡";
                    warnEl.className = "text-[11px] text-gray-500 font-bold ml-2";
                }
            }

            renderLogs();
            drawChart();
            save();
        }

        function addLog() {
            const b = parseFloat(document.getElementById('in-brix').value);
            const p = parseFloat(document.getElementById('in-ph').value);
            const t = parseFloat(document.getElementById('in-temp').value);
            const timeStr = document.getElementById('in-time').value;
            const ts = timeStr ? new Date(timeStr).getTime() : Date.now();

            if (!p) return alert("pH 值为必须填写的核心指标");
            if (!t) return alert("必须填写发酵温度以校准预估时间");

            const brixVal = isNaN(b) ? (state.f1.logs.length ? state.f1.logs[state.f1.logs.length-1].brix : 10) : b;

            state.f1.logs.push({ brix: brixVal, ph: p, temp: t, time: ts });
            state.f1.logs.sort((a, b) => a.time - b.time);
            
            document.getElementById('in-ph').value = "";
            document.getElementById('in-brix').value = "";
            showToast("记录已归档");
            runLogic();
        }

        function startF2() {
            if (state.f1.logs.length === 0) return alert("无 F1 数据");
            if (confirm("即将切断需氧发酵，进入厌氧碳酸化阶段，确定吗？")) {
                state.f2.active = true;
                state.f2.startTime = Date.now();
                runLogic();
            }
        }

        function cancelF2() {
            state.f2.active = false;
            runLogic();
        }

        function deleteLog(i) {
            state.f1.logs.splice(i, 1);
            runLogic();
        }

        function save() { localStorage.setItem('kb_lab_v9', JSON.stringify(state)); }
        
        function resetBatch() {
            if (confirm("清空全部发酵数据？")) {
                localStorage.clear();
                window.location.reload(true);
            }
        }

        function renderLogs() {
            const container = document.getElementById('log-container');
            container.innerHTML = [...state.f1.logs].reverse().map((log, i) => `
                <div class="glass-card p-3 flex justify-between items-center !mb-1">
                    <div>
                        <p class="text-[9px] text-gray-500 mb-1">${new Date(log.time).toLocaleDateString()} ${new Date(log.time).toLocaleTimeString()}</p>
                        <p class="text-xs font-mono font-bold text-white">
                            <span class="text-blue-400">pH: ${log.ph}</span> | 
                            <span class="text-amber-500">Brix: ${log.brix}</span> | 
                            ${log.temp}°C
                        </p>
                    </div>
                    ${!state.f2.active ? `<button onclick="deleteLog(${state.f1.logs.length - 1 - i})" class="text-gray-600 hover:text-red-500 px-2">×</button>` : ''}
                </div>
            `).join('');
        }

        function drawChart() {
            const ctx = document.getElementById('roadmap-chart').getContext('2d');
            const labels = state.f1.logs.map(l => new Date(l.time).toLocaleDateString('zh-CN', {month:'numeric', day:'numeric'}));
            const dataBrix = state.f1.logs.map(l => l.brix);
            const dataPh = state.f1.logs.map(l => l.ph);

            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels.length ? labels : ['Start'],
                    datasets: [
                        {
                            label: 'pH (关键酸度)',
                            data: dataPh.length ? dataPh : [null],
                            borderColor: '#60a5fa', backgroundColor: 'rgba(96, 165, 250, 0.1)',
                            yAxisID: 'y1', tension: 0.3, borderWidth: 2, pointRadius: 4
                        },
                        {
                            label: 'Brix (折射仪视数)',
                            data: dataBrix.length ? dataBrix : [null],
                            borderColor: '#fbbf24', borderDash: [4, 4],
                            yAxisID: 'y2', tension: 0.3, borderWidth: 1, pointRadius: 2
                        }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#555', font: { size: 9 } } },
                        y1: { 
                            type: 'linear', position: 'left', 
                            title: { display: true, text: 'pH', color: '#60a5fa', font: {size: 10} },
                            grid: { color: '#1a1a1a' }, ticks: { color: '#60a5fa' },
                            suggestedMin: 2.5, suggestedMax: 4.5
                        },
                        y2: { 
                            type: 'linear', position: 'right',
                            title: { display: true, text: 'Brix', color: '#fbbf24', font: {size: 10} },
                            grid: { display: false }, ticks: { color: '#fbbf24' }
                        }
                    }
                }
            });
        }

        window.onload = () => {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('in-time').value = now.toISOString().slice(0, 16);
            runLogic();
        };
    </script>
</body>
</html>
