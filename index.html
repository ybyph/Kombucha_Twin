<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kombucha Twin v4.0 - 稳定修复版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; color: #e5e5e5; font-family: sans-serif; }
        input { background-color: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; padding: 8px; border-radius: 4px; width: 100%; }
        .card { background-color: #141414; border: 1px solid #262626; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .label-text { font-size: 10px; font-weight: bold; color: #9ca3af; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .accent-text { color: #fbbf24; font-family: monospace; font-size: 1.25rem; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">

    <header class="mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold">Kombucha Twin <span class="text-amber-500">v4.0</span></h1>
            <p class="text-[10px] text-gray-500">物理逻辑接管 - 稳定版</p>
        </div>
        <button onclick="resetData()" class="text-[10px] bg-red-900/30 text-red-400 px-2 py-1 rounded">重置批次</button>
    </header>

    <div class="card border-l-4 border-blue-500">
        <h3 class="label-text text-blue-400">容器物理约束</h3>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="label-text">液位高度 (cm)</label>
                <input type="number" id="h-input" value="18.5" step="0.1" oninput="runAllLogic()">
            </div>
            <div>
                <label class="label-text">A/V 传质比</label>
                <div id="av-display" class="accent-text text-green-400">0.000</div>
            </div>
        </div>
    </div>

    <div class="card border-l-4 border-amber-500">
        <h3 class="label-text text-amber-400">新手配方推算 (1:7)</h3>
        <div class="flex gap-2 mb-4">
            <select id="factor" class="bg-[#1a1a1a] border border-[#333] text-sm rounded p-2">
                <option value="starter">以启动液为基准</option>
            </select>
            <input type="number" id="base-val" value="300" class="flex-1">
            <button onclick="applyRecipe()" class="bg-amber-600 text-black font-bold px-4 rounded text-sm">应用</button>
        </div>
        <div class="grid grid-cols-2 gap-2 text-[11px] text-gray-400">
            <div>纯水: <span id="r-water">--</span>g</div>
            <div>启动液: <span id="r-starter">--</span>g</div>
            <div>白糖: <span id="r-sugar">--</span>g</div>
            <div>干茶: <span id="r-tea">--</span>g</div>
        </div>
    </div>

    <div class="card bg-amber-900/10 border-amber-900/30">
        <div class="grid grid-cols-2 gap-4 text-center">
            <div>
                <p class="label-text">当前估计 ABV</p>
                <p id="abv-val" class="text-2xl font-bold text-amber-500">0.00%</p>
            </div>
            <div>
                <p class="label-text">预计剩余时间</p>
                <p id="time-val" class="text-2xl font-bold text-white">--</p>
            </div>
        </div>
    </div>

    <div class="card">
        <h3 class="label-text">采样日志录入</h3>
        <div class="grid grid-cols-2 gap-2 mb-2">
            <input type="number" id="in-brix" placeholder="Brix %" step="0.1">
            <input type="number" id="in-temp" placeholder="温度 °C" value="25">
        </div>
        <button onclick="addLog()" class="w-full bg-white text-black font-bold py-2 rounded mt-2">APPEND LOG</button>
    </div>

    <div id="log-list" class="space-y-2 mb-20"></div>

    <script>
        // --- 核心逻辑 ---
        let logs = JSON.parse(localStorage.getItem('kb_logs')) || [];

        function runAllLogic() {
            // 1. A/V 计算: 1 / 高度
            const h = parseFloat(document.getElementById('h-input').value) || 0;
            document.getElementById('av-display').innerText = h > 0 ? (1/h).toFixed(3) : "0.000";

            // 2. 看板计算
            if (logs.length > 0) {
                const first = logs[0];
                const last = logs[logs.length - 1];
                // ABV = (开始Brix - 当前Brix) * 0.5
                const abv = Math.max(0, (first.brix - last.brix) * 0.5);
                document.getElementById('abv-val').innerText = abv.toFixed(2) + "%";

                // 剩余时间: 积温 2100 / 平均温
                const avgTemp = logs.reduce((s, l) => s + l.temp, 0) / logs.length;
                const hoursTotal = 2100 / (avgTemp || 25);
                const elapsed = (new Date() - new Date(first.time)) / 3600000;
                const remain = Math.max(0, hoursTotal - elapsed);
                document.getElementById('time-val').innerText = Math.round(remain) + "h";
            }
            renderLogs();
        }

        function applyRecipe() {
            const base = parseFloat(document.getElementById('base-val').value) || 0;
            // 1:7 黄金比例
            const water = base * 7;
            document.getElementById('r-water').innerText = Math.round(water);
            document.getElementById('r-starter').innerText = Math.round(base);
            document.getElementById('r-sugar').innerText = Math.round(water * 0.1);
            document.getElementById('r-tea').innerText = Math.round(water * 0.01);
        }

        function addLog() {
            const b = parseFloat(document.getElementById('in-brix').value);
            const t = parseFloat(document.getElementById('in-temp').value) || 25;
            if (isNaN(b)) return alert("请输入 Brix");

            logs.push({ brix: b, temp: t, time: new Date().toISOString() });
            localStorage.setItem('kb_logs', JSON.stringify(logs));
            document.getElementById('in-brix').value = "";
            runAllLogic();
        }

        function renderLogs() {
            const container = document.getElementById('log-list');
            container.innerHTML = logs.map((l, i) => `
                <div class="card p-3 flex justify-between items-center text-sm mb-2">
                    <span>${new Date(l.time).toLocaleTimeString()} | <b>${l.brix}%</b> | ${l.temp}°C</span>
                    <button onclick="delLog(${i})" class="text-red-500 text-xs">删除</button>
                </div>
            `).reverse().join('');
        }

        function delLog(i) {
            logs.splice(i, 1);
            localStorage.setItem('kb_logs', JSON.stringify(logs));
            runAllLogic();
        }

        function resetData() {
            if (confirm("确定重置吗？")) {
                localStorage.removeItem('kb_logs');
                logs = [];
                location.reload();
            }
        }

        // 页面加载后立即执行
        window.onload = runAllLogic;
    </script>
</body>
</html>
